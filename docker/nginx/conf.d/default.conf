server {
    listen 80;
    server_name _;

    client_max_body_size 500M;

    location / {
        return 302 /share/;
    }

    location /share/ {
        proxy_pass http://testalf-share:8080/share/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE_USER admin;
        proxy_set_header X-Remote-User admin;
        proxy_set_header X-Test-User SUPER_MEGA_TEST_123;
    }

    location /alfresco/ {
        proxy_pass http://testalf-acs:8080/alfresco/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}