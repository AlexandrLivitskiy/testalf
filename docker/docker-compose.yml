version: '3.4'
services:
  testalf-share:
    image: alfresco-share-testalf:development
    build:
      dockerfile: ./Dockerfile
      context: ../../../testalf-share-docker/target
    environment:
      CATALINA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=0.0.0.0:8888"
      REPO_HOST: testalf-acs
      REPO_PORT: 8080
      JAVA_OPTS: "
                      -Dmessaging.broker.url=\"failover:(nio://activemq:61616)?timeout=3000&jms.useCompression=true\"
                      -Ddeployment.method=DOCKER_COMPOSE
                      -DlocalTransform.core-aio.url=http://transform-core-aio:8090/
                      -Dcsrf.filter.enabled=false
                      -XX:MinRAMPercentage=50 -XX:MaxRAMPercentage=80
                      "
    ports:
      - "${share.port}:8080"
      - "${share.debug.port}:8888"
    networks:
      - internal
  testalf-acs:
    image: alfresco-content-services-testalf:development
    build:
      dockerfile: ./Dockerfile
      context: ../../../testalf-platform-docker/target
    environment:
      JAVA_TOOL_OPTIONS: "${keystore.settings}"
      CATALINA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=0.0.0.0:8888"
    ports:
      - "${acs.port}:8080"
      - "${acs.debug.port}:8888"
    networks:
      - internal
    volumes:
      - testalf-acs-volume:/usr/local/tomcat/alf_data
    depends_on:
      - testalf-postgres
  testalf-postgres:
    image: postgres:9.6
    environment:
      POSTGRES_DB: alfresco
      POSTGRES_USER: alfresco
      POSTGRES_PASSWORD: alfresco
    command: postgres -c max_connections=300 -c log_min_messages=LOG
    ports:
      - "${postgres.port}:5432"
    networks:
      - internal
    volumes:
      - testalf-db-volume:/var/lib/postgresql/data
  testalf-ass:
    image: alfresco/alfresco-search-services:1.2.0
    environment:
      SOLR_ALFRESCO_HOST: testalf-acs
      SOLR_ALFRESCO_PORT: 8080
      SOLR_SOLR_HOST: testalf-ass
      SOLR_SOLR_PORT: 8983
      SOLR_CREATE_ALFRESCO_DEFAULTS: alfresco,archive
    ports:
      - "8983:8983"
    networks:
      - internal
    volumes:
      - testalf-ass-volume:/opt/alfresco-search-services/contentstore
      - testalf-ass-volume:/opt/alfresco-search-services/data
  transform-core-aio:
    image: alfresco/alfresco-transform-core-aio:2.3.10
    environment:
      JAVA_OPTS: " -XX:MinRAMPercentage=50 -XX:MaxRAMPercentage=80"
    ports:
      - 8090:8090
    networks:
      - internal
  activemq:
    image: alfresco/alfresco-activemq:5.16.1
    ports:
      - 8161:8161 # Web Console
      - 5672:5672 # AMQP
      - 61616:61616 # OpenWire
      - 61613:61613 # STOMP
    networks:
      - internal
  proxy:
    image: nginx:latest
    container_name: nginx-proxy
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
#      - "443:443"
    depends_on:
      - testalf-acs
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  testalf-acs-volume:
    external: true
  testalf-db-volume:
    external: true
  testalf-ass-volume:
    external: true
